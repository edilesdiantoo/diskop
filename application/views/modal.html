<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container">
  <h2>Modal Example</h2>
  <!-- Trigger the modal with a button -->
  <button type="button" class="btn btn-info btn-lg" data-toggle="modal" data-target="#myModal">Open Modal</button>

  <!-- Modal -->
  <div class="modal fade" id="myModal" role="dialog">
    <div class="modal-dialog">
    
      <!-- Modal content-->
      <div class="modal-content">
        <div class="modal-body text-center" style="padding-top: 2.5rem !important; padding-bottom: 4.5rem !important;">
          <div><h3 style="font-weight: semibold !important;">Notifikasi</h3></div>
          <div style="padding-bottom: 1rem;"><i class="bi bi-bell-fill" style="color: #23cde6; font-size: 5rem;"></i></div>
          <div style="color: #bfbfbf; font-size: 12px;">Nomor kartu keluarga anda sudah terdaftar di sistem.</div>
          <div style="padding-top: 2rem;"><button class="btn btn-primary" style="border: 0; border-radius: 25px; background-color: #23cde6; font-size: 12px; padding: 7px 20px;">Bukti Pengajuan</button></div>
        </div>
      </div>
      
    </div>
  </div>
  
</div>

</body>
</html>
