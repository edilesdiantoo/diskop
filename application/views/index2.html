<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&display=swap"
    rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <style type="text/css">
    @import url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
    }
    .bg-image {
      background: url(banner-edi4.png);
      background-repeat: no-repeat;
      background-size: 100% 100vh;
    }
    .iawal::placeholder {
      padding-left: 7px;
      font-size: 12px;
      color: #cccccc;
    }
    .iawal {
      border: 0;
      border-radius: 25px;
    }
  </style>
  <body class="bg-image">
    <div class="container">
      <div class="row pt-5">
        <div class="col">
          <div class="d-flex align-items-center justify-content-center">
            <img src="logojambi.png" style="width: 5vw;">
            <div class="ps-1 text-white" style="font-size: 1.5vw;">DINAS KOPERASI DAN UKM <div class="fw-semibold" style="font-size: 2vw;">PROVINSI JAMBI</div></div>
          </div>
        </div>
      </div>
      <div class="row pt-5">
        <div class="col">
          <div class="fs-4 fw-bold text-white text-center">MENJAWAB KEBUTUHAN INFORMASI PUBLIK WARGA JAMBI</div>
        </div>
      </div>
      <div class="container-fluid">
        <div class="row pt-5">
          <div class="col">
            <div class="text-white text-center" style="font-size: 2.2vw;">Temukan informasi publik terkini dari Pemerintah Daerah Provinsi Jambi</div>
            <div class="pt-2">
              <input class="form-control iawal" type="text" placeholder="Pencarian...">
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <div class="fixed-bottom text-white text-center fw-lighter" style="font-size:3vw; padding-bottom: 25px !important;">
            Jalan Jendral Ahmad Yani No.11, Telanaipura, Kec. Telanaipura, Kota Jambi, Jambi 36361
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
